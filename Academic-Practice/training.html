<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Hub | AcadBeat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="acadbeat-global.css">
  <link rel="stylesheet" href="practice-style.css">
</head>
<body data-page="training-home">
  <nav>
    <a class="logo" href="../home.html">Acad<span>Beat</span></a>
    <div class="nav-menu">
      <a class="nav-item" href="../home.html?module=Lexis">Vocabulary</a>
      <a class="nav-item active" href="../home.html?module=Insight">Academic</a>
      <a class="nav-item" href="../home.html?module=Dialogue">Forum</a>
      <a class="nav-item" href="../home.html?module=Method">Technology</a>
    </div>
    <div class="user-group">
      <div class="user-section" id="userSection" onclick="handleUserAction()">
        <span id="userLabel" class="user-label">LOGIN</span>
        <div class="avatar" id="userAvatar">IN</div>
      </div>
      <a href="#" class="logout-link" id="logoutLink" onclick="return handleLogout(event)" style="display:none;">Log out</a>
    </div>
  </nav>

  <main class="module-content page-shell">
    <section class="section-block training-clean">
      <header class="training-clean-header">
        <h2>Training</h2>
      </header>

      <div class="training-clean-grid">
        <article class="training-clean-card">
          <span class="training-clean-kicker">Mode 01</span>
          <div class="training-visual visual-quiz" aria-hidden="true">
            <span class="qa-row"><i></i><b></b></span>
            <span class="qa-row"><i></i><b></b></span>
            <span class="qa-row"><i></i><b></b></span>
          </div>
          <h3>Listening and Understand</h3>
          <p>Extract the key points from videos</p>
          <a class="training-go-btn" href="listening.html?mode=understand">GO</a>
        </article>

        <article class="training-clean-card">
          <span class="training-clean-kicker">Mode 02</span>
          <div class="training-visual visual-record" aria-hidden="true">
            <span class="mic-core"></span>
            <span class="mic-wave"></span>
            <span class="mic-wave"></span>
          </div>
          <h3>Listening and Respond</h3>
          <p>Try to speak with confidence</p>
          <a class="training-go-btn" href="listening.html?mode=respond">GO</a>
        </article>
      </div>
    </section>

  </main>

  <script src="practice-data.js"></script>
  <script src="practice-app.js"></script>
  <script>
    const AUTH_API_BASE = '../Auth/backend/api';
    const authState = { user: null };

    function initialsOf(name) {
      const trimmed = String(name || '').trim();
      if (!trimmed) return 'IN';
      return trimmed.slice(0, 2).toUpperCase();
    }

    function renderAuthUI() {
      const label = document.getElementById('userLabel');
      const avatar = document.getElementById('userAvatar');
      const logoutLink = document.getElementById('logoutLink');
      if (!label || !avatar || !logoutLink) return;

      if (authState.user) {
        label.textContent = authState.user.username;
        avatar.textContent = initialsOf(authState.user.username);
        logoutLink.style.display = 'inline-flex';
      } else {
        label.textContent = 'LOGIN';
        avatar.textContent = 'IN';
        logoutLink.style.display = 'none';
      }
    }

    async function authFetch(path, options = {}) {
      const response = await fetch(`${AUTH_API_BASE}/${path}`, {
        method: options.method || 'GET',
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        credentials: 'include',
        body: options.body || undefined
      });
      return response.json().catch(() => ({ status: 'error' }));
    }

    async function loadAuthUser() {
      const data = await authFetch('me.php');
      authState.user = data.status === 'success' ? data.user : null;
      renderAuthUI();
    }

    function handleUserAction() {
      if (authState.user) {
        window.location.href = '../owner.html';
        return;
      }
      window.location.href = '../home.html?login=1';
    }

    async function handleLogout(event) {
      if (event) event.preventDefault();
      if (!authState.user) return false;
      await authFetch('logout.php');
      authState.user = null;
      renderAuthUI();
      window.location.href = '../home.html';
      return false;
    }

    loadAuthUser();
  </script>
</body>
</html>

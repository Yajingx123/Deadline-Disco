<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Response Practice | AcadBeat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared-nav.css">
  <script src="../shared/acadbeat-local-config.js"></script>
  <style>html.acadbeat-role-guard body{visibility:hidden}</style>
  <script>
    document.documentElement.classList.add('acadbeat-role-guard');
    (async function guardAdminGameRespone() {
      try {
        const response = await fetch('../Auth/backend/api/me.php', { credentials: 'include' });
        const data = await response.json().catch(() => ({ status: 'error' }));
        if (data.status === 'success' && data.user && String(data.user.role || '').toLowerCase() === 'admin') {
          const admin = (window.ACADBEAT_LOCAL && window.ACADBEAT_LOCAL.adminDistUrl) || window.location.origin + '/admin_page/dist/index.html';
          window.location.replace(admin);
          return;
        }
      } catch (_err) {}
      document.documentElement.classList.remove('acadbeat-role-guard');
    })();
  </script>
  <link rel="stylesheet" href="acadbeat-global.css">
  <link rel="stylesheet" href="game-practice-style.css">
</head>
<body data-page="response-detail">
  <div id="acadbeatNav"></div>
  <main class="module-content page-shell">
    <section class="respond-layout">
      <article class="video-panel respond-video-panel">
        <div class="workspace-top-actions">
          <button class="back-btn back-fab" data-back-target="listening.html" aria-label="Go back" title="Back" type="button">&#8592;</button>
          <h2 id="respondTitle">Video title</h2>
        </div>
        <p id="respondPersonMeta" class="person-meta-line"></p>
        <div id="respondMeta" class="detail-meta-row"></div>
        <video id="respondVideo" controls preload="metadata"></video>
        <div class="detail-resource-tabs">
          <button class="btn-small transcript-toggle-btn detail-resource-tab" id="respondTranscriptToggleBtn" type="button">Transcript</button>
        </div>
        <aside class="transcript-panel hidden" id="respondTranscriptPanel">
          <div class="detail-resource-head">
            <strong id="respondResourceTitle">Transcript</strong>
          </div>
          <div class="transcript-content" id="respondTranscriptContent"></div>
        </aside>
      </article>

      <aside class="note-panel respond-record-panel">
        <div class="note-panel-head respond-panel-head">
          <h3>Your Response</h3>
          <div class="note-panel-head-actions">
            <button class="btn-small note-share-btn" id="respondShareBtn" type="button">Share</button>
          </div>
        </div>
        <p class="respond-hint">Record your answer and replay it to self-check fluency and clarity.</p>
        <div class="respond-speaking-wrap">
          <button class="respond-speaking-btn" id="respondRecordBtn" type="button">SPEAKING</button>
        </div>
        <p id="respondRecordStatus" class="recording-status">Ready to record.</p>
        <audio id="respondPlayback" class="respond-audio" controls></audio>
        <div class="respond-save-row">
          <button class="btn-small btn-primary-small" id="respondSaveBtn" type="button">Save your answer</button>
          <span class="note-record-error hidden" id="respondSaveError">no recording yet</span>
        </div>
        <div class="note-record-feedback hidden" id="respondSaveFeedback">
          <strong>Saved to your study record</strong>
          <span>You can still make multiple attempts and save</span>
        </div>
      </aside>
    </section>
  </main>

  <script src="practice-data.js"></script>
  <script src="practice-data-api.js"></script>
  <script src="practice-app-api.js"></script>
  <script>
    window.addEventListener('load', () => {
      const L = window.ACADBEAT_LOCAL || {};
      window.initializeAcadBeatNav({
        mountId: 'acadbeatNav',
        basePath: '../',
        active: 'academic',
        authApiBase: '../Auth/backend/api',
        homeUrl: '../home.html',
        ownerUrl: '../owner.html',
        forumUrl: '../home.html?module=Dialogue',
        technologyUrl: '../home.html?module=Method',
        studioUrl: '../Studio/studio.html',
        messageCenterUrl: L.messageCenterDistUrl,
        adminUrl: L.adminDistUrl || window.location.origin + '/admin_page/dist/index.html',
        messageApiUrl: L.messageSummaryApiUrl,
        loginUrl: '../home.html?login=1',
        redirectAdmins: true,
        showChallengeButton: false
      });
    });
  </script>
  <script src="../shared-nav.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Session | AcadBeat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared-nav.css">
  <script src="../shared/acadbeat-local-config.js"></script>
  <style>html.acadbeat-role-guard body{visibility:hidden}</style>
  <script>
    document.documentElement.classList.add('acadbeat-role-guard');
    (async function guardAdminVoiceSession() {
      try {
        const response = await fetch('../Auth/backend/api/me.php', { credentials: 'include' });
        const data = await response.json().catch(() => ({ status: 'error' }));
        if (data.status === 'success' && data.user && String(data.user.role || '').toLowerCase() === 'admin') {
          const admin = (window.ACADBEAT_LOCAL && window.ACADBEAT_LOCAL.adminDistUrl) || 'http://127.0.0.1:8001/admin_page/dist/index.html';
          window.location.replace(admin);
          return;
        }
      } catch (_err) {}
      document.documentElement.classList.remove('acadbeat-role-guard');
    })();
  </script>
  <link rel="stylesheet" href="practice-style.css">
</head>
<body data-page="voice-room-session">
  <div id="acadbeatNav"></div>
  <main class="module-content page-shell voice-room-session-shell">
    <div class="voice-room-session-topbar">
      <button id="voiceRoomExitBtn" class="voice-room-exit-btn" type="button">Exit the room</button>
      <div id="voiceRoomCountdown" class="voice-room-countdown">05:00</div>
    </div>

    <section class="voice-room-session-hero">
      <h1 id="voiceRoomSessionTopic">Introduce Your Major To A New Classmate</h1>
      <p id="voiceRoomSessionState" class="voice-room-session-state">Waiting for another speaker to join...</p>
    </section>

    <section class="section-block voice-room-duo-board">
      <div class="voice-room-duo-stage">
        <article class="voice-room-speaker-card voice-room-speaker-card--left">
          <div class="voice-room-speaker-orb voice-room-speaker-orb--left">
            <span class="voice-room-speaker-initial" id="voiceRoomUserOneInitial">Y</span>
          </div>
          <strong id="voiceRoomUserOne">You</strong>
        </article>

        <div class="voice-room-wave-bridge" aria-hidden="true">
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
          <span class="voice-room-wave-segment"></span>
        </div>

        <article class="voice-room-speaker-card voice-room-speaker-card--right">
          <div class="voice-room-speaker-orb voice-room-speaker-orb--right">
            <span class="voice-room-speaker-initial" id="voiceRoomUserTwoInitial">P</span>
          </div>
          <strong id="voiceRoomUserTwo">Partner</strong>
        </article>
      </div>
    </section>
  </main>

  <div id="voiceRoomTimeupModal" class="voice-room-modal hidden" role="dialog" aria-modal="true" aria-labelledby="voiceRoomTimeupTitle">
    <div class="voice-room-modal-card">
      <h2 id="voiceRoomTimeupTitle">Time is up!</h2>
      <p>Go and enjoy your next conversation</p>
      <button id="voiceRoomTimeupBtn" class="voice-room-modal-btn" type="button">Back to room list</button>
    </div>
  </div>
 
  <script src="voice-room.js"></script>
  <script>
    window.addEventListener('load', () => {
      const L = window.ACADBEAT_LOCAL || {};
      window.initializeAcadBeatNav({
        mountId: 'acadbeatNav',
        basePath: '../',
        active: 'academic',
        authApiBase: '../Auth/backend/api',
        homeUrl: '../home.html',
        ownerUrl: '../owner.html',
        forumUrl: '../home.html?module=Dialogue',
        technologyUrl: '../home.html?module=Method',
        studioUrl: '../Studio/studio.html',
        messageCenterUrl: L.messageCenterDistUrl,
        adminUrl: L.adminDistUrl || 'http://127.0.0.1:8001/admin_page/dist/index.html',
        messageApiUrl: L.messageSummaryApiUrl,
        loginUrl: '../home.html?login=1',
        redirectAdmins: true,
        showChallengeButton: false
      });
    });
  </script>
  <script src="../shared-nav.js"></script>
</body>
</html>

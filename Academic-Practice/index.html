<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadBeat | Academic Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared-nav.css">
  <style>html.acadbeat-role-guard body{visibility:hidden}</style>
  <script>
    document.documentElement.classList.add('acadbeat-role-guard');
    (async function guardAdminPracticeIndex() {
      try {
        const response = await fetch('../Auth/backend/api/me.php', { credentials: 'include' });
        const data = await response.json().catch(() => ({ status: 'error' }));
        if (data.status === 'success' && data.user && String(data.user.role || '').toLowerCase() === 'admin') {
          window.location.replace('http://127.0.0.1:8001/admin_page/dist/index.html');
          return;
        }
      } catch (_err) {}
      document.documentElement.classList.remove('acadbeat-role-guard');
    })();
  </script>
  <link rel="stylesheet" href="acadbeat-global.css">
  <link rel="stylesheet" href="practice-style.css">
</head>
<body data-page="home">
  <div id="acadbeatNav"></div>

  <main class="home-main module-content" style="padding-top: 110px;">
    <p class="module-label">Academic English Practice</p>
    <h1 class="quote-text">Train your ears.<br>Speak with confidence.</h1>
    <p class="home-subtitle">
      A focused listening and speaking space for first-year students.
      Practice alone or discuss campus-life topics with peers.
    </p>
    <div class="home-actions">
      <a class="btn-small btn-primary-small" href="training.html">Go To Training</a>
    </div>
  </main>
  <script>
    window.addEventListener('load', () => {
      window.initializeAcadBeatNav({
        mountId: 'acadbeatNav',
        basePath: '../',
        active: 'academic',
        authApiBase: '../Auth/backend/api',
        homeUrl: '../home.html',
        ownerUrl: '../owner.html',
        adminUrl: 'http://127.0.0.1:8001/admin_page/dist/index.html',
        redirectAdmins: true
      });
    });
  </script>
  <script src="../shared-nav.js"></script>
</body>
</html>

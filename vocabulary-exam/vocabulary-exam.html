<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Exam - AcadBeat</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <a class="logo" href="javascript:void(0)" onclick="goMain()">Acad<span>Beat</span></a>
    <div class="nav-menu">
        <div class="nav-item active">Vocabulary</div>
        <div class="nav-item" onclick="goMain()">Listening</div>
        <div class="nav-item" onclick="goMain()">Speaking</div>
        <div class="nav-item" onclick="goMain()">Reading</div>
        <div class="nav-item" onclick="goMain()">Writing</div>
    </div>
    <div class="user-section">
        <span style="font-size: 0.75rem; font-weight: 700;">ALEX RIVERA</span>
        <div class="avatar">AR</div>
    </div>
</nav>

<main>
    <header class="topbar">
        <div class="topbar-left">
            <strong>Vocabulary / Mastery Check</strong>
        </div>
        <div class="topbar-right">
            <label class="chip chip-select" for="level-select" style="padding: 0 10px;">
                <span style="font-weight: 750;">Level</span>
                <select id="level-select" class="level-select" aria-label="Select difficulty level">
                    <option value="advanced" selected>Advanced (GRE)</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="beginner">Beginner</option>
                </select>
            </label>
        </div>
    </header>

    <div class="content-body">
        <div class="exam-shell">
            <div class="materials-head">
                <h2>Unit 1: Essential Academic Vocabulary</h2>
                <div class="materials-tags">
                    <span class="chip" id="exam-info-chip">Loading...</span>
                </div>
            </div>

            <div class="exam-workbench">
                <div class="question-stack">
                    <div class="exam-toolbar card">
                        <div class="toolbar-line">
                            <strong>Part A: Contextual Meanings</strong>
                            <span class="toolbar-right" style="color: var(--muted); font-size: 0.85rem;">Select or type the most appropriate answer</span>
                        </div>
                    </div>
                    <div id="question-container" style="display: grid; gap: 14px;"></div>
                </div>

                <aside class="exam-side card">
                    <div class="session-timer">
                        <span>Time Remaining</span>
                        <strong id="time-display">00:00</strong>
                    </div>
                    <hr style="border: 0; border-top: 1px solid var(--line); margin: 16px 0;">
                    <div class="exam-nav compact">
                        <div class="session-head">
                            <strong>Question Navigation</strong>
                            <span class="chip" style="font-size: 0.75rem;" id="answered-count">0 / 0</span>
                        </div>
                        <div class="question-grid" id="nav-grid"></div>
                        <button class="submit-btn strong" id="submit-btn" style="width: 100%;">Submit Exam</button>
                        <button class="submit-btn strong" id="retake-btn" style="width: 100%; margin-top: 10px; display: none;" type="button">Retake Exam</button>
                    </div>
                </aside>
            </div>
        </div>
    </div>
</main>

<a class="backToMainBtn" id="back-to-main-btn" href="http://127.0.0.1:5173/" aria-label="Back to main page">
    Back to Main
</a>

<script>
    const DEFAULT_MAIN_URL = "http://127.0.0.1:5173/";
    const RETURN_KEY = "vocab_return_url";

    function resolveMainUrl() {
        const ref = document.referrer || "";
        if (ref && (ref.includes("127.0.0.1:5173") || ref.includes("home.html"))) {
            sessionStorage.setItem(RETURN_KEY, ref);
            return ref;
        }
        return sessionStorage.getItem(RETURN_KEY) || DEFAULT_MAIN_URL;
    }

    function goMain() {
        window.location.href = resolveMainUrl();
    }

    (function initBackToMain() {
        const btn = document.getElementById("back-to-main-btn");
        if (btn) {
            btn.href = resolveMainUrl();
        }
    })();
</script>

<script src="questions.js"></script>
<script src="exam.js"></script>
</body>
</html>

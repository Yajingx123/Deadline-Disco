name: CI (dev)

on:
  push:
    branches: [dev, feature/**]
  pull_request:
    branches: [dev]

jobs:
  forum-frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forum-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: forum-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
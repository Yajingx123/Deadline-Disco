name: Forum Build Check

on:
  push:
    branches: [dev, feature/**]
    paths:
      - "forum-project/**"
      - ".github/workflows/forum-build.yml"
  pull_request:
    branches: [dev]
    paths:
      - "forum-project/**"
      - ".github/workflows/forum-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forum-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: forum-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

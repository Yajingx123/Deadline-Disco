name: Forum Build Artifact

on:
  pull_request:
    branches: [dev]
    paths:
      - "forum-project/**"
      - ".github/workflows/forum-artifact.yml"
  workflow_dispatch:

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forum-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: forum-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: forum-project-dist
          path: forum-project/dist
          if-no-files-found: error

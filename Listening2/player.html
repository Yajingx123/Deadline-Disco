<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - ACADBEAT</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="player.css">
    <style>
        /* 全屏提示层样式（高透明版本） */
        .audio-id-missing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, 
                rgba(155, 183, 212, 0.3) 0%, 
                rgba(228, 223, 216, 0.2) 50%, 
                rgba(58, 78, 107, 0.3) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(4px);
        }
        
        .audio-id-missing-content {
            max-width: 600px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .audio-id-missing-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: #3A4E6B;
            font-weight: 600;
        }
        
        .audio-id-missing-text {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
            color: rgba(58, 78, 107, 0.9);
        }
        
        .collections-link {
            display: inline-block;
            padding: 15px 30px;
            background-color: rgba(155, 183, 212, 0.9);
            color: white;
            text-decoration: none;
            font-size: 18px;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(155, 183, 212, 0.3);
        }
        
        .collections-link:hover {
            background-color: rgba(58, 78, 107, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 78, 107, 0.3);
        }
    </style>
</head>
<body>
    <div class="top-bar">
            <a href="collections.html" class="logo">ACADBEAT</a>
        <div class="top-right">
            <span>🔔</span>
            <span>⚙️</span>
            <span>👤</span>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <ul class="sidebar-links">
                <li><a href="collections.html">collections</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="player.html" class="active">Player</a></li>
               
            </ul>
        </div>

        <div class="content-container">
            <div class="content-area">
                <div class="page-title">
                    <span>Player</span>
                </div>
                
                <div class="player-wrapper">
                    <audio id="textAudio" controls></audio>
                    <div id="subtitleContainer"></div>
                </div>

                <div class="lesson-info-card">
                    <div class="info-item">
                        <span class="info-label">Lesson:</span>
                        <span class="info-value" id="lessonTitle">Loading...</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Current Line:</span>
                        <span class="info-value" id="currentLine">0</span>/<span id="totalLines">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Saved Sentences:</span>
                        <span class="info-value" id="savedCount">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

   <script>
    // 仅保留核心全局变量
    let audioPlayer;          
    let subtitleContainer;    
    let currentLineElement;   
    let totalLinesElement;    
    let savedCountElement;    
    let lessonTitleElement;   
    let isManualScrolling = false; 
    let subtitleLines = [];   
    let subtitlesData = [];   
    // 资源基础路径（可根据实际部署路径调整）
    const BASE_AUDIO_PATH = './listening/';
    // 本地存储key前缀
    const STORAGE_PREFIX = 'acadbeat_player_';

    // ===== 新增：本地存储相关函数 =====
    // 保存播放器状态到本地存储
    function savePlayerState(audioId, progress = 0, savedStars = []) {
        const state = {
            audioId: audioId,
            progress: progress,
            savedStars: savedStars,
            lastUpdate: new Date().getTime()
        };
        localStorage.setItem(STORAGE_PREFIX + 'state', JSON.stringify(state));
        // 同步到URL Hash（方便分享）
        window.location.hash = audioId;
    }

    // 从本地存储读取播放器状态
    function getSavedPlayerState() {
        const stateStr = localStorage.getItem(STORAGE_PREFIX + 'state');
        if (stateStr) {
            try {
                return JSON.parse(stateStr);
            } catch (e) {
                console.error('解析存储状态失败:', e);
            }
        }
        return null;
    }

    // 保存播放进度（实时调用）
    function savePlaybackProgress() {
        if (!audioPlayer || !audioPlayer.src) return;
        const audioId = getAudioIdFromUrl() || getSavedPlayerState()?.audioId;
        if (audioId) {
            savePlayerState(audioId, audioPlayer.currentTime, getSavedStars());
        }
    }

    // 获取收藏的星星索引
    function getSavedStars() {
        const saved = [];
        document.querySelectorAll('.star-icon.filled').forEach(star => {
            const line = star.closest('.subtitle-line');
            if (line) saved.push(parseInt(line.dataset.index));
        });
        return saved;
    }

    // 恢复收藏的星星状态
    function restoreSavedStars(savedIndices = []) {
        subtitleLines.forEach((line, index) => {
            const star = line.querySelector('.star-icon');
            if (savedIndices.includes(index)) {
                star.textContent = '★';
                star.classList.add('filled');
            } else {
                star.textContent = '☆';
                star.classList.remove('filled');
            }
        });
        updateSavedCount();
    }

    // ===== 原有函数修改 =====
    // 创建并显示全屏提示层
    function showAudioIdMissingOverlay() {
        // 先检查本地存储是否有历史音频ID
        const savedState = getSavedPlayerState();
        if (savedState?.audioId) {
            if (confirm('检测到你之前播放的音频：' + savedState.audioId + '\n是否恢复播放？')) {
                // 恢复历史音频
                loadAudioAndSubtitles(savedState.audioId);
                return;
            }
        }

        // 创建提示层元素
        const overlay = document.createElement('div');
        overlay.className = 'audio-id-missing-overlay';
        
        // 提示层内容
        overlay.innerHTML = `
            <div class="audio-id-missing-content">
                <h2 class="audio-id-missing-title">缺少音频ID参数</h2>
                <p class="audio-id-missing-text">
                    无法加载音频资源，因为URL中没有包含有效的audio_id参数。<br><br>
                    请从 collections 页面选择音频后跳转至播放器页面。
                </p>
                <a href="collections.html" class="collections-link">
                    前往 Collections 页面
                </a>
            </div>
        `;
        
        // 添加到页面
        document.body.appendChild(overlay);
        
        // 禁止页面滚动
        document.body.style.overflow = 'hidden';
    }

    // 从URL获取audio_id的函数（优先URL → 其次Hash → 最后本地存储）
    function getAudioIdFromUrl() {
        // 1. 优先从URL参数获取
        const params = new URLSearchParams(window.location.search);
        let audioId = params.get('audio_id');
        
        // 2. 其次从Hash获取（#audioId）
        if (!audioId && window.location.hash) {
            audioId = window.location.hash.slice(1); // 去掉#
        }

        // 3. 验证参数是否有效
        if (audioId && audioId.trim() !== '') {
            // 保存到本地存储
            savePlayerState(audioId.trim());
            return audioId.trim();
        }

        // 4. 最后从本地存储获取
        const savedState = getSavedPlayerState();
        if (savedState?.audioId) {
            return savedState.audioId;
        }

        // 都没有则显示提示
        showAudioIdMissingOverlay();
        return null;
    }

    // 加载动态路径的音频和字幕资源（支持传入audioId）
    async function loadAudioAndSubtitles(customAudioId = null) {
        // 获取audio_id（优先传入的ID → URL → 本地存储）
        const audioId = customAudioId || getAudioIdFromUrl();
        if (!audioId) return;

        // 拼接动态资源路径
        const dynamicAudioPath = `${BASE_AUDIO_PATH}${audioId}.mp3`;
        const dynamicSubtitlePath = `${BASE_AUDIO_PATH}${audioId}.json`;
        const dynamicLessonTitle = audioId;

        try {
            // 加载音频
            audioPlayer.src = dynamicAudioPath;
            await audioPlayer.load();
            lessonTitleElement.textContent = dynamicLessonTitle;

            // 恢复播放进度
            const savedState = getSavedPlayerState();
            if (savedState?.progress && savedState.audioId === audioId) {
                audioPlayer.currentTime = savedState.progress;
            }

            // 加载字幕
            try {
                const subtitleResponse = await fetch(dynamicSubtitlePath);
                if (!subtitleResponse.ok) throw new Error('字幕文件不存在');
                
                subtitlesData = await subtitleResponse.json();
                renderSubtitles(subtitlesData);
                totalLinesElement.textContent = subtitlesData.length;

                // 恢复收藏状态
                if (savedState?.savedStars && savedState.audioId === audioId) {
                    restoreSavedStars(savedState.savedStars);
                }
            } catch (subtitleErr) {
                console.warn('加载字幕失败:', subtitleErr);
                subtitleContainer.innerHTML = `<div>暂无字幕 (${dynamicSubtitlePath})</div>`;
                subtitleLines = [];
                subtitlesData = [];
                totalLinesElement.textContent = 0;
                currentLineElement.textContent = 0;
            }

            updateSavedCount();

        } catch (err) {
            console.error('加载资源失败:', err);
            alert(`加载音频资源失败：${dynamicAudioPath} 不存在或路径错误`);
        }
    }

    // 渲染字幕（保留所有核心功能）
    function renderSubtitles(subtitles) {
        subtitleContainer.innerHTML = '';
        subtitleLines = [];

        subtitles.forEach((item, index) => {
            const line = document.createElement('div');
            line.className = 'subtitle-line';
            line.dataset.start = item.start;
            line.dataset.end = item.end;
            line.dataset.index = index;
            
            line.innerHTML = `
                <span class="subtitle-text">${item.text}</span>
                <span class="star-icon">☆</span>
            `;

            // 点击字幕跳转到对应时间播放
            line.addEventListener('click', () => {
                if (audioPlayer.readyState >= 1) {  
                    audioPlayer.pause();
                    audioPlayer.currentTime = parseFloat(item.start);
                    console.log('点击跳转到时间:', item.start);
                    console.log('当前时间:', audioPlayer.currentTime);
                    
                    subtitleLines.forEach(l => l.classList.remove('active'));
                    line.classList.add('active');
                    line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    updateCurrentLine(line);
                    
                    // 保存进度
                    savePlaybackProgress();
                    
                    audioPlayer.play().catch(err => {
                        console.warn('自动播放失败（浏览器策略限制）:', err);
                    });
                } else {
                    const setTimeAndPlay = () => {
                        audioPlayer.currentTime = parseFloat(item.start);
                        subtitleLines.forEach(l => l.classList.remove('active'));
                        line.classList.add('active');
                        line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        updateCurrentLine(line);
                        audioPlayer.removeEventListener('loadedmetadata', setTimeAndPlay);
                        
                        // 保存进度
                        savePlaybackProgress();
                        
                        audioPlayer.play().catch(err => {
                            console.warn('自动播放失败（浏览器策略限制）:', err);
                        });
                    };
                    audioPlayer.addEventListener('loadedmetadata', setTimeAndPlay);
                }
            });

            // 收藏星星逻辑
            const starIcon = line.querySelector('.star-icon');
            starIcon.addEventListener('click', function(e) {
                e.stopPropagation();
                this.textContent = this.textContent === '☆' ? '★' : '☆';
                this.classList.toggle('filled');
                // 保存收藏状态
                savePlaybackProgress();
                updateSavedCount();
            });

            subtitleContainer.appendChild(line);
            subtitleLines.push(line);
        });
    }

    // 更新收藏数量
    function updateSavedCount() {
        const savedStars = document.querySelectorAll('.star-icon.filled');
        savedCountElement.textContent = savedStars.length;
    }
    
    // 更新当前行数
    function updateCurrentLine(line) {
        const lineIndex = parseInt(line.dataset.index) + 1;
        currentLineElement.textContent = lineIndex;
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
        audioPlayer = document.querySelector('#textAudio');
        subtitleContainer = document.getElementById('subtitleContainer');
        currentLineElement = document.getElementById('currentLine');
        totalLinesElement = document.getElementById('totalLines');
        savedCountElement = document.getElementById('savedCount');
        lessonTitleElement = document.getElementById('lessonTitle');

        // 滚轮手动滚动时暂停自动字幕跟随
        subtitleContainer.addEventListener('wheel', (e) => {
            isManualScrolling = true;
            setTimeout(() => {
                isManualScrolling = false;
            }, 3000);
        });

        // 音频播放时间监听，自动高亮对应字幕 + 保存进度
        audioPlayer.addEventListener('timeupdate', () => {
            // 实时保存播放进度（每500ms一次，避免频繁存储）
            if (audioPlayer.currentTime % 0.5 < 0.1) {
                savePlaybackProgress();
            }

            if (isManualScrolling) return;

            const currentTime = audioPlayer.currentTime;
            let activeLine = null;

            subtitleLines.forEach(line => {
                const start = parseFloat(line.dataset.start);
                const end = parseFloat(line.dataset.end);
                if (currentTime >= start && currentTime < end) {
                    activeLine = line;
                }
            });

            if (activeLine) {
                subtitleLines.forEach(l => l.classList.remove('active'));
                activeLine.classList.add('active');
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                updateCurrentLine(activeLine);
            }
        });

        // 页面关闭/刷新前最后保存一次
        window.addEventListener('beforeunload', savePlaybackProgress);

        // 加载动态路径的音频和字幕
        await loadAudioAndSubtitles();
    });
</script>
</body>
</html>

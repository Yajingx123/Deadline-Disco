<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inclusive Listening - ACADBEAT</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="in_listen.css">
    <script src="./sentence-player.js" defer></script>
    <style>
        /* 可选：添加一些基础样式以确保移除侧边栏后内容居中或占满全屏 */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .main-container {
            display: block; /* 移除原本的 flex 布局影响，如果有的话 */
            width: 100%;
            height: 100vh;
        }
        .content-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            box-sizing: border-box;
        }
        .content-area {
            width: 100%;
            max-width: 800px; /* 限制最大宽度以保持阅读体验 */
        }
    </style>
</head>
<body>

    <!-- Main Container (Sidebar Removed) -->
    <div class="main-container">
        <!-- Interactive Listening Page Content -->
        <div class="content-container">
            <div class="content-area">
                <!-- 页面标题（包含Save按钮） -->
                <div class="page-title">
                    <span>In_Listening - Intensive Listening</span>
                    <div class="title-right">
                        <button class="save-btn" id="btn-save-progress">
                            Save Progress to Server
                        </button>
                        <a href="collections.html" class="back-button">← Back to Collections</a>
                    </div>
                </div>
                
                <div class="listening-content">
                    <!-- Headphone Icon -->
                    <div class="headphone-container">
                        <div class="headphone-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                            </svg>
                        </div>
                        <div class="ripple-ring"></div>
                        <div class="ripple-ring"></div>
                        <div class="ripple-ring"></div>
                    </div>

                    <!-- Comprehension Progress Bar -->
                    <div class="progress-wrapper">
                        <div class="progress-label">
                            <span>Article Comprehension</span>
                            <span id="progress-text">0 / 0</span>
                        </div>
                        <div class="overall-progress-bar" id="progress-bar"></div>
                        
                        <!-- Progress Bar Legend -->
                        <div class="progress-legend">
                            <div class="legend-item">
                                <div class="legend-color legend-understood"></div>
                                <span>Understood</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color legend-not-understood"></div>
                                <span>Didn't Understand</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color legend-skipped"></div>
                                <span>Skipped</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color legend-current"></div>
                                <span>Current Sentence</span>
                            </div>
                        </div>
                    </div>

                    <!-- Status Selection -->
                    <div class="status-text">Please select your understanding status</div>
                    <div class="status-buttons">
                        <div class="status-btn-group">
                            <button class="status-btn not-understood" id="btn-not-understand">
                                <span class="btn-icon">😵</span> Didn't understand
                            </button>
                            <button class="status-btn understood" id="btn-understand">
                                <span class="btn-icon">😊</span> Understood
                            </button>
                        </div>
                    </div>

                    <!-- Player -->
                    <div class="player-container">
                        <sentence-player id="myPlayer"></sentence-player>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global Variables
        let audioId = null, sentences = [], player = null, progress = [];
        const STORAGE_KEY = 'comprehension_', USER_ID = 1;

        // Utility Functions
        const getAudioId = () => new URLSearchParams(location.search).get('audio_id');
        
        const loadProgressFromLocal = () => {
            const data = localStorage.getItem(STORAGE_KEY + audioId);
            if (data) {
                try { return JSON.parse(data); }
                catch (e) { console.error('Failed to parse local progress', e); }
            }
            return Array(sentences.length).fill(0);
        };

        const saveProgressToLocal = () => {
            localStorage.setItem(STORAGE_KEY + audioId, JSON.stringify(progress));
        };

        const calculateOverallProgress = () => {
            if (!sentences.length) return 0;
            const doneCount = progress.filter(s => s === 1 || s === 2).length;
            return Math.round((doneCount / sentences.length) * 100);
        };

        const getCompletionStatus = () => {
            const doneCount = progress.filter(s => s === 1 || s === 2).length;
            if (doneCount === 0) return 'Not Started';
            return doneCount === sentences.length ? 'completed' : 'in_progress';
        };

        // Backend API - Load Progress
        const loadProgressFromServer = async () => {
            if (!audioId) return loadProgressFromLocal();
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/audio/progress?user_id=${USER_ID}&audio_id=${parseInt(audioId)}`);
                const responseText = await response.text();
                  
                if (!responseText.trim()) {
                    console.log('Empty response from server, using local progress');
                    return loadProgressFromLocal();
                }

                const result = JSON.parse(responseText);
                
                if (result.code === 0 && result.data?.progress_data) {
                    const serverProgress = Array.isArray(result.data.progress_data) 
                        ? result.data.progress_data 
                        : JSON.parse(result.data.progress_data || '[]');
                    return serverProgress.length === sentences.length ? serverProgress : loadProgressFromLocal();
                }
            } catch (error) {
                console.error('Failed to load server progress, using local progress: ', error);
            }
            return loadProgressFromLocal();
        };

        // Backend API - Save Progress
        const saveProgressToServer = async () => {
            if (!audioId || !sentences.length) {
                alert('No audio data to save!');
                return;
            }

            const postData = {
                action: 'update_audio_progress',
                user_id: USER_ID,
                audio_id: parseInt(audioId),
                progress_percent: calculateOverallProgress(),
                current_index: player.currentSentenceIndex,
                progress_data: JSON.stringify(progress),
                status: getCompletionStatus()
            };

            try {
                const response = await fetch('./api/index.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(postData)
                });
                
                const responseText = await response.text();
                if (!responseText.trim()) {
                    alert('Save failed: Empty response from server');
                    return;
                }

                const result = JSON.parse(responseText);
                
                if (result.code === 0) {
                    alert('Progress saved successfully!');
                    saveProgressToLocal();
                } else {
                    alert('Save failed: ' + (result.msg || 'Unknown error'));
                }
            } catch (error) {
                alert('Network error: ' + error.message);
                console.error('Save failed: ', error);
            }
        };

        // Render Progress Bar
        const renderProgressBar = () => {
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            bar.innerHTML = '';

            if (!sentences.length) return;
            
            const doneCount = progress.filter(s => s !== 0).length;
            text.textContent = `${doneCount} / ${sentences.length}`;
            
            const segmentWidth = 100 / sentences.length;
            const currentIndex = player.currentSentenceIndex;

            progress.forEach((status, index) => {
                const segment = document.createElement('div');
                segment.style.width = `${segmentWidth}%`;
                segment.className = 'progress-segment' + (index === currentIndex ? ' current' : '');
                
                if (status === 1) segment.classList.add('progress-understood');
                else if (status === 2) segment.classList.add('progress-not-understood');
                else if (status === 3) segment.classList.add('progress-skipped');

                bar.appendChild(segment);
            });
        };

        // Mark Current Sentence Status
        const markCurrent = (status) => {
            progress[player.currentSentenceIndex] = status;
            saveProgressToLocal();
            renderProgressBar();

            const nextBtn = player.querySelector('.sentence-next-btn');
            if (nextBtn && player.currentSentenceIndex < sentences.length - 1) {
                nextBtn.click();
            }
        };

        // Monitor Player Buttons
        const watchPlayerButtons = () => {
            const nextBtn = player.querySelector('.sentence-next-btn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    const idx = player.currentSentenceIndex;
                    if (progress[idx] === 0) {
                        progress[idx] = 3;
                        saveProgressToLocal();
                    }
                    renderProgressBar();
                });
            }

            const prevBtn = player.querySelector('.sentence-prev-btn');
            const playBtn = player.querySelector('.sentence-play-btn');
            
            if (prevBtn) prevBtn.addEventListener('click', renderProgressBar);
            if (playBtn) playBtn.addEventListener('click', renderProgressBar);
        };

        // Initialization
        document.addEventListener('DOMContentLoaded', async () => {
            audioId = getAudioId();
            player = document.getElementById('myPlayer');

            if (!audioId) {
                alert('No audio ID provided!');
                return;
            }

            try {
                const jsonRes = await fetch(`./listening/${audioId}.json`);
                sentences = await jsonRes.json();

                progress = await loadProgressFromServer();
                
                player.setAttribute('audio-src', `./listening/${audioId}.mp3`);
                player.setAttribute('sentences', JSON.stringify(sentences));

                renderProgressBar();
                watchPlayerButtons();
                document.getElementById('btn-understand').onclick = () => markCurrent(1);
                document.getElementById('btn-not-understand').onclick = () => markCurrent(2);
                document.getElementById('btn-save-progress').onclick = saveProgressToServer;

                setInterval(renderProgressBar, 500);
            } catch (err) {
                alert(`Failed to load audio/subtitles: ${err.message}`);
                console.error('Initialization failed: ', err);
            }
        });
    </script>
</body>
</html>
